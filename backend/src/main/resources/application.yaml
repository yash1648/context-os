spring:
  application:
    name: ContextOS

  dotenv:
    location: file:../.env

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:contextos}
    username: ${PG_USER:contextos}
    password: ${PG_PASSWORD:contextos}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

server:
  port: ${APP_PORT:6969}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-256-bits-long-for-hs512}
  access-token-expiration: 900000
  refresh-token-expiration: 2592000000

logging:
  level:
    com.grim.contextos: DEBUG
    org.springframework.security: INFO
